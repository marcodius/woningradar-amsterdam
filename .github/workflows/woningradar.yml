name: Woningradar

on:
  schedule:
    - cron: "11 */3 * * *"     # elke 3 uur (UTC), op een off-peak minuut
  workflow_dispatch: {}          # handmatige trigger via de Actions-tab
  push:
    branches: [main]             # publiceer ook meteen bij een wijziging

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Onderdrukt de Node 20-deprecation-waarschuwing op de runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python 3.12 instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dependencies installeren
        run: python -m pip install -r requirements.txt

      # Optioneel: browser voor JS-zware bronnen (Funda/Pararius via Playwright).
      # - name: Browser installeren
      #   run: |
      #     pip install playwright
      #     python -m playwright install --with-deps chromium

      - name: Woningen ophalen, scoren en listings.json bouwen
        run: python -m woningradar.run --interval-uren 3

      - name: Pages-artefact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Naar GitHub Pages publiceren
        id: deployment
        uses: actions/deploy-pages@v4
